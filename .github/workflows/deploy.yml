name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      clear_npm_cache:
        description: "Clear npm cache before install"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Clear npm cache (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.clear_npm_cache }}
        run: npm cache clean --force

      - name: Install dependencies
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund --no-package-lock

      - name: Configure git identity for gh-pages commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy to GitHub Pages
        run: npm run deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
