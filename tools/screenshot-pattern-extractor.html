<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screenshot Pattern Extractor</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        font-family: Arial, sans-serif;
        padding: 16px;
        box-sizing: border-box;
      }

      .layout {
        display: grid;
        grid-template-columns: 40% 60%;
        gap: 16px;
        align-items: start;
        height: calc(100vh - 64px);
      }

      .left,
      .right {
        min-width: 0;
        min-height: 0;
      }

      .left {
        overflow: hidden;
      }

      .right {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        overflow: hidden;
      }

      .row {
        margin-bottom: 12px;
      }

      label {
        display: inline-block;
        min-width: 180px;
      }

      textarea {
        width: 100%;
        height: 140px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        resize: none;
        box-sizing: border-box;
      }

      #previewCanvas {
        border: 1px solid #999;
        background: #f5f5f5;
        display: block;
        margin-top: 8px;
        width: 100%;
        max-width: 100%;
        max-height: calc(100vh - 140px);
        aspect-ratio: 1 / 1;
        height: auto;
      }

      .muted {
        color: #555;
      }

      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
          height: calc(100vh - 64px);
          gap: 10px;
        }

        .right {
          justify-content: flex-start;
        }

        #previewCanvas {
          max-height: 40vh;
        }
      }
    </style>
  </head>
  <body>
    <h2>Screenshot → Conway Pattern Coordinates</h2>

    <div class="layout">
      <div class="left">
        <div class="row">
          <label for="imageInput">Screenshot</label>
          <input id="imageInput" type="file" accept="image/*" />
        </div>

        <div class="row">
          <label for="threshold">Black threshold (0-255)</label>
          <input id="threshold" type="number" min="0" max="255" value="10" />
        </div>

        <div class="row">
          <label for="aliveColor">Alive cell color</label>
          <input id="aliveColor" type="color" value="#000000" />
          <span class="muted">(default: black)</span>
        </div>

        <div class="row">
          <button id="extractBtn">Extract Coordinates</button>
          <button id="copyBtn" type="button">Copy Output</button>
          <button id="downloadBtn" type="button">Download JSON</button>
        </div>

        <div class="row">
          <label for="minComponentPixels">Min block size (pixels)</label>
          <input id="minComponentPixels" type="number" min="1" value="40" />
          <span class="muted">Ignore tiny color noise</span>
        </div>

        <p id="status" class="muted">Top-left pixel is considered coordinate [0, 0].</p>

        <textarea id="output" readonly placeholder="Coordinates will appear here..."></textarea>
      </div>

      <div class="right">
        <div class="row">
          <label>Pattern preview</label>
          <canvas id="previewCanvas" width="640" height="640"></canvas>
        </div>
      </div>
    </div>

    <script>
      const imageInput = document.getElementById('imageInput');
      const thresholdInput = document.getElementById('threshold');
      const aliveColorInput = document.getElementById('aliveColor');
      const minComponentPixelsInput = document.getElementById('minComponentPixels');
      const extractBtn = document.getElementById('extractBtn');
      const copyBtn = document.getElementById('copyBtn');
      const downloadBtn = document.getElementById('downloadBtn');
      const output = document.getElementById('output');
      const status = document.getElementById('status');
      const previewCanvas = document.getElementById('previewCanvas');
      let lastExtractedCells = [];

      function renderPreview(cells) {
        const ctx = previewCanvas.getContext('2d');
        if (!ctx) return;

        const w = previewCanvas.width;
        const h = previewCanvas.height;
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = '#f5f5f5';
        ctx.fillRect(0, 0, w, h);

        if (!cells.length) {
          ctx.fillStyle = '#777';
          ctx.font = '14px Arial';
          ctx.fillText('No cells to preview', 140, 210);
          return;
        }

        const maxX = Math.max(...cells.map(([x]) => x));
        const maxY = Math.max(...cells.map(([, y]) => y));
        const cols = maxX + 1;
        const rows = maxY + 1;

        const padding = 20;
        const availableW = w - padding * 2;
        const availableH = h - padding * 2;
        const cellSize = Math.max(2, Math.floor(Math.min(availableW / cols, availableH / rows)));

        const gridW = cols * cellSize;
        const gridH = rows * cellSize;
        const offsetX = Math.floor((w - gridW) / 2);
        const offsetY = Math.floor((h - gridH) / 2);

        ctx.strokeStyle = '#d0d0d0';
        ctx.lineWidth = 1;
        for (let x = 0; x <= cols; x++) {
          const px = offsetX + x * cellSize + 0.5;
          ctx.beginPath();
          ctx.moveTo(px, offsetY);
          ctx.lineTo(px, offsetY + gridH);
          ctx.stroke();
        }
        for (let y = 0; y <= rows; y++) {
          const py = offsetY + y * cellSize + 0.5;
          ctx.beginPath();
          ctx.moveTo(offsetX, py);
          ctx.lineTo(offsetX + gridW, py);
          ctx.stroke();
        }

        ctx.fillStyle = '#222';
        for (const [x, y] of cells) {
          ctx.fillRect(offsetX + x * cellSize, offsetY + y * cellSize, cellSize, cellSize);
        }
      }

      function hexToRgb(hex) {
        const normalized = hex.replace('#', '');
        const value = normalized.length === 3
          ? normalized.split('').map((c) => c + c).join('')
          : normalized;

        const r = Number.parseInt(value.slice(0, 2), 16);
        const g = Number.parseInt(value.slice(2, 4), 16);
        const b = Number.parseInt(value.slice(4, 6), 16);
        return { r, g, b };
      }

      function loadImage(file) {
        return new Promise((resolve, reject) => {
          const url = URL.createObjectURL(file);
          const img = new Image();

          img.onload = () => {
            URL.revokeObjectURL(url);
            resolve(img);
          };

          img.onerror = () => {
            URL.revokeObjectURL(url);
            reject(new Error('Unable to load image file.'));
          };

          img.src = url;
        });
      }

      function extractMatchingCells(img, threshold, targetColor) {
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        ctx.drawImage(img, 0, 0);

        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        const cells = [];

        for (let y = 0; y < canvas.height; y++) {
          for (let x = 0; x < canvas.width; x++) {
            const i = (y * canvas.width + x) * 4;
            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];
            const a = data[i + 3];

            if (a === 0) continue;
            if (
              Math.abs(r - targetColor.r) <= threshold &&
              Math.abs(g - targetColor.g) <= threshold &&
              Math.abs(b - targetColor.b) <= threshold
            ) {
              cells.push([x, y]);
            }
          }
        }

        return cells;
      }

      function collectConnectedComponents(points, width, height, minPixels) {
        const pointSet = new Set(points.map(([x, y]) => `${x},${y}`));
        const visited = new Set();
        const components = [];

        for (const [sx, sy] of points) {
          const startKey = `${sx},${sy}`;
          if (visited.has(startKey)) continue;

          const queue = [[sx, sy]];
          visited.add(startKey);

          let count = 0;
          let sumX = 0;
          let sumY = 0;

          while (queue.length > 0) {
            const [x, y] = queue.pop();
            count += 1;
            sumX += x;
            sumY += y;

            const neighbors = [
              [x + 1, y],
              [x - 1, y],
              [x, y + 1],
              [x, y - 1]
            ];

            for (const [nx, ny] of neighbors) {
              if (nx < 0 || ny < 0 || nx >= width || ny >= height) continue;
              const key = `${nx},${ny}`;
              if (!pointSet.has(key) || visited.has(key)) continue;
              visited.add(key);
              queue.push([nx, ny]);
            }
          }

          if (count >= minPixels) {
            components.push({
              area: count,
              cx: sumX / count,
              cy: sumY / count
            });
          }
        }

        return components;
      }

      function estimateStep(values) {
        const sorted = [...values].sort((a, b) => a - b);
        const diffs = [];
        for (let i = 1; i < sorted.length; i++) {
          const d = sorted[i] - sorted[i - 1];
          if (d > 2) diffs.push(d);
        }

        if (diffs.length === 0) return 1;

        diffs.sort((a, b) => a - b);
        return diffs[Math.floor(diffs.length / 2)];
      }

      function componentsToGridCoords(components) {
        if (components.length === 0) return [];

        const stepX = estimateStep(components.map((c) => c.cx));
        const stepY = estimateStep(components.map((c) => c.cy));
        const minX = Math.min(...components.map((c) => c.cx));
        const minY = Math.min(...components.map((c) => c.cy));

        const unique = new Set();
        const coords = [];

        for (const component of components) {
          const gx = Math.round((component.cx - minX) / stepX);
          const gy = Math.round((component.cy - minY) / stepY);
          const key = `${gx},${gy}`;
          if (unique.has(key)) continue;
          unique.add(key);
          coords.push([gx, gy]);
        }

        coords.sort((a, b) => (a[1] - b[1]) || (a[0] - b[0]));
        return coords;
      }

      imageInput.addEventListener('change', () => {
        output.value = '';
        lastExtractedCells = [];
        status.textContent = 'New image selected. Ready to extract coordinates.';
        renderPreview([]);
      });

      extractBtn.addEventListener('click', async () => {
        const file = imageInput.files && imageInput.files[0];
        if (!file) {
          status.textContent = 'Please choose an image first.';
          return;
        }

        const threshold = Number(thresholdInput.value);
        if (!Number.isFinite(threshold) || threshold < 0 || threshold > 255) {
          status.textContent = 'Threshold must be a number between 0 and 255.';
          return;
        }

        const targetColor = hexToRgb(aliveColorInput.value || '#000000');
        const minComponentPixels = Number(minComponentPixelsInput.value);
        if (!Number.isFinite(minComponentPixels) || minComponentPixels < 1) {
          status.textContent = 'Min block size must be >= 1.';
          return;
        }

        try {
          status.textContent = 'Processing...';
          const img = await loadImage(file);
          const matchingPixels = extractMatchingCells(img, threshold, targetColor);
          const components = collectConnectedComponents(
            matchingPixels,
            img.naturalWidth,
            img.naturalHeight,
            Math.floor(minComponentPixels)
          );
          const cells = componentsToGridCoords(components);

          lastExtractedCells = cells;
          output.value = JSON.stringify(cells);
          renderPreview(cells);
          status.textContent = `Done. Found ${cells.length} alive cells from ${components.length} connected color blocks.`;
        } catch (error) {
          status.textContent = error instanceof Error ? error.message : 'Failed to process image.';
        }
      });

      copyBtn.addEventListener('click', async () => {
        if (!output.value) return;
        await navigator.clipboard.writeText(output.value);
        status.textContent = 'Output copied to clipboard.';
      });

      downloadBtn.addEventListener('click', () => {
        if (!lastExtractedCells.length) {
          status.textContent = 'Extract coordinates first before downloading.';
          return;
        }

        const promptValue = window.prompt('Enter pattern name:', 'customPattern');
        if (promptValue === null) {
          status.textContent = 'Download cancelled.';
          return;
        }

        const rawName = promptValue.trim();
        const name = rawName || 'customPattern';
        const safeFileName = name.replace(/[^a-z0-9-_]/gi, '_');
        const payload = {
          name,
          cells: lastExtractedCells
        };

        const json = `${JSON.stringify(payload, null, 2)}\n`;
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = `${safeFileName}.json`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);

        status.textContent = `Downloaded ${a.download}`;
      });

      renderPreview([]);
    </script>
  </body>
</html>
